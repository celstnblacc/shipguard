# Repo-level scan profile for the ShipGuard codebase itself.
# Excludes intentional vulnerable fixtures and rule-definition text to keep
# local `shipguard scan .` output focused on actionable findings.

severity_threshold: medium

exclude_paths:
  - "vendor/**"
  - "node_modules/**"
  - "tests/**"
  - "docs/**"
  - "src/shipguard/rules/**"
  - "rust/**"

# SC-005 suppressed for this repo: the docker run in security.yml is OWASP ZAP
# for DAST testing — not a production image pull requiring cosign verification.
disable_rules:
  - SC-005
custom_rules_dirs: []
use_rust_secrets: false
