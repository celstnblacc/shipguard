---
name: 'ShipGuard Security Scan'
description: 'Scan for security vulnerabilities across languages'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  severity:
    description: 'Minimum severity to report (critical, high, medium, low)'
    required: false
    default: 'medium'
  format:
    description: 'Output format (terminal, json, markdown)'
    required: false
    default: 'terminal'
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  config:
    description: 'Path to .shipguard.yml config file'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install ShipGuard
      shell: bash
      # Install from the action's own checkout so the version always matches the action tag,
      # eliminating the unpinned-package supply chain risk.
      run: pip install "$GITHUB_ACTION_PATH"

    - name: Run Security Scan
      shell: bash
      run: |
        ARGS=(scan "${{ inputs.path }}" --severity "${{ inputs.severity }}")
        ARGS+=(--format "${{ inputs.format }}")
        if [ -n "${{ inputs.config }}" ]; then
          ARGS+=(--config "${{ inputs.config }}")
        fi
        shipguard "${ARGS[@]}"
