---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          pip install -q -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=src/shipguard --cov-report=term-missing

      - name: Test CLI
        run: |
          set -e
          shipguard list-rules
          set +e
          shipguard scan tests/fixtures/ --format json > /tmp/test-output.json
          SCAN_EXIT=$?
          set -e
          if [ "$SCAN_EXIT" -ne 0 ] && [ "$SCAN_EXIT" -ne 1 ]; then
            echo "Unexpected shipguard exit code: $SCAN_EXIT"
            exit "$SCAN_EXIT"
          fi
          python -m json.tool < /tmp/test-output.json > /dev/null

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install pre-commit
        run: pip install -q pre-commit

      - name: Run pre-commit
        run: |
          pre-commit run --all-files check-added-large-files
          pre-commit run --all-files check-case-conflict
          pre-commit run --all-files check-json
          pre-commit run --all-files check-merge-conflict
