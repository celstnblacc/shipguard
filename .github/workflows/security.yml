---
name: 7-Layer Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # Layer 1: Dependencies - Detect vulnerable Python packages
  layer-1-python-deps:
    name: Layer 1 - Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit for Python dependencies
        if: hashFiles('requirements*.txt', 'pyproject.toml') != ''
        run: pip-audit --skip-editable

  # Layer 1: Dependencies - Detect vulnerable JavaScript packages
  layer-1-js-deps:
    name: Layer 1 - JavaScript Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 'lts/*'

      - name: Run npm audit
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=moderate

      - name: Run pnpm audit
        if: hashFiles('pnpm-lock.yaml') != ''
        run: |
          corepack enable
          pnpm audit

  # Layer 2: Secrets - Detect hardcoded credentials
  layer-2-secrets-gitleaks:
    name: Layer 2 - Detect Secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --no-git --redact --verbose
  # Layer 2: Secrets - ShipGuard layer 2 specific rules
  layer-2-secrets-shipguard:
    name: Layer 2 - Secrets (ShipGuard Report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ShipGuard
        run: pip install -e .

      - name: Run ShipGuard for Secrets (Layer 2, blocking)
        run: |
          shipguard scan . --severity critical \
            --include-rules SEC-001,SEC-002,SEC-003,SEC-004,SEC-005,SEC-006,SEC-007,SEC-008,SEC-009,SEC-010,SEC-011,SEC-012,SEC-013,SEC-014,SEC-015 \
            --format json > layer2-report.json
          CRITICAL=$(python3 -c "import json; d=json.load(open('layer2-report.json')); print(sum(1 for f in d.get('findings',[]) if f['severity']=='critical'))")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "⛔ $CRITICAL critical secret(s) detected — commit blocked"
            exit 1
          fi
      - name: Upload Layer 2 Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: layer2-secrets-report
          path: layer2-report.json

  # Layer 3: SAST - Static Application Security Testing (blocking: critical + high)
  layer-3-sast:
    name: Layer 3 - SAST (ShipGuard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ShipGuard
        run: pip install -e .

      - name: Run ShipGuard Full Scan (Layer 3)
        run: shipguard scan . --format json > layer3-report.json
      - name: Check for Blocking Findings (Critical + High)
        run: |
          CRITICAL=$(grep -o '"severity":"critical"' layer3-report.json | wc -l)
          HIGH=$(grep -o '"severity":"high"' layer3-report.json | wc -l)
          BLOCKERS=$((CRITICAL + HIGH))
          if [ "$BLOCKERS" -gt 0 ]; then
            echo "Found $BLOCKERS blocking findings (critical=$CRITICAL, high=$HIGH)"
            exit 1
          fi
      - name: Upload Layer 3 Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: layer3-sast-report
          path: layer3-report.json

      - name: Run ShipGuard SARIF Scan
        run: shipguard scan . --format sarif --output results.sarif
        if: always()

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@f09c1c0a46b326c31cf5a0e0b80d2a83a13e6b26 # v3
        with:
          sarif_file: results.sarif
        if: always()

  layer-2-trufflehog:
    name: Layer 2 - TruffleHog Entropy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v3.88.1
      - name: Run TruffleHog filesystem scan
        run: |
          trufflehog filesystem . --json --exclude-paths .gitleaks.toml > trufflehog-report.json 2>/dev/null || true
      - name: Upload TruffleHog Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: layer2-trufflehog-report
          path: trufflehog-report.json

  layer-3-external-sast:
    name: Layer 3 - External SAST (ShellCheck + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install ShipGuard + external tools
        run: |
          pip install -e .
          pip install semgrep
          sudo apt-get install -y shellcheck
      - name: Run ShipGuard with external tools (SARIF output)
        run: shipguard scan . --with-external --format sarif --output external-sast.sarif || true
      - name: Upload external SARIF
        uses: github/codeql-action/upload-sarif@f09c1c0a46b326c31cf5a0e0b80d2a83a13e6b26 # v3
        with:
          sarif_file: external-sast.sarif
        if: always()

  layer-1-trivy:
    name: Layer 1 - Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y && sudo apt-get install -y trivy
      - name: Run Trivy filesystem scan
        run: trivy fs --format sarif --output trivy.sarif . || true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@f09c1c0a46b326c31cf5a0e0b80d2a83a13e6b26 # v3
        with:
          sarif_file: trivy.sarif
        if: always()

  # Layer 4: AI Reasoning - Comment reminder for manual review
  layer-4-ai-reasoning:
    name: Layer 4 - AI Reasoning Reminder
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Post PR Comment about AI Review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **Layer 4: AI Reasoning** - Please conduct a manual security review, considering:\n- Authorization/authentication logic\n- Business logic vulnerabilities\n- Architectural patterns\n- Data handling and privacy\n\nUse an AI tool (Claude, GPT-4, etc.) or human architect for comprehensive review.'
            })
  # Layer 5: DAST - Dynamic Application Security Testing
  layer-5-dast:
    name: Layer 5 - DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    if: vars.PREVIEW_URL != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run -t owasp/zap2docker-stable:2.15.0 \
            zap-baseline.py \
            -t "${{ vars.PREVIEW_URL }}" \
            -r layer5-zap-report.html \

      - name: Upload Layer 5 Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: layer5-dast-report
          path: layer5-zap-report.html
        if: always()

  # Layer 6: Supply Chain - Verify Docker images and dependency pinning
  layer-6-supply-chain:
    name: Layer 6 - Supply Chain Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ShipGuard
        run: pip install -e .

      - name: Check for Unpinned Docker Images
        run: shipguard scan . --include-rules SC-001 --format json > layer6-docker-report.json
      - name: Check for Unpinned Python Dependencies
        run: shipguard scan . --include-rules SC-002 --format json > layer6-python-deps-report.json
      - name: Check for npm/pnpm without Lockfile
        run: shipguard scan . --include-rules SC-003 --format json > layer6-npm-lockfile-report.json
      - name: Check .gitignore for missing secret entries
        run: shipguard scan . --include-rules SC-004 --format json > layer6-gitignore-report.json
      - name: Verify Lockfiles
        run: |
          if [ -f "requirements.txt" ]; then
            echo "✓ Python lockfile present"
          fi
          if [ -f "package-lock.json" ] || [ -f "pnpm-lock.yaml" ]; then
            echo "✓ JavaScript lockfile present"
          fi
      - name: Upload Layer 6 Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: layer6-supply-chain-reports
          path: layer6-*-report.json

  # Layer 7: Observability - Comment reminder for monitoring setup
  layer-7-observability:
    name: Layer 7 - Observability Reminder
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Post Observability Reminder
        run: |
          echo "📊 Layer 7: Observability & Incident Response"
          echo "Ensure your deployment includes:"
          echo "- Security event logging"
          echo "- Real-time alerting for suspicious activities"
          echo "- SIEM integration"
          echo "- Incident response runbooks"
          echo "- Post-incident analysis process"
  # Summary Job
  security-summary:
    name: Security Pipeline Summary
    runs-on: ubuntu-latest
    needs: [layer-1-python-deps, layer-2-secrets-gitleaks, layer-2-secrets-shipguard, layer-3-sast, layer-6-supply-chain, layer-2-trufflehog, layer-3-external-sast, layer-1-trivy]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9

      - name: Print Security Summary
        run: |
          echo "================================"
          echo "7-Layer Security Pipeline Summary"
          echo "================================"
          echo "✅ Layer 1: Dependencies - Checked"
          echo "✅ Layer 2: Secrets - Checked"
          echo "✅ Layer 3: SAST - Checked"
          echo "✅ Layer 4: AI Reasoning - Review reminder sent"
          echo "⚠️  Layer 5: DAST - Conditional (requires PREVIEW_URL)"
          echo "✅ Layer 6: Supply Chain - Checked"
          echo "✅ Layer 7: Observability - Reminder sent"
          echo "================================"
