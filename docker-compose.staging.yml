services:
  shipguard-runner:
    image: python:3.12-slim
    container_name: shipguard-runner-staging
    env_file:
      - .env.staging
    command: ["sleep", "infinity"]
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "python", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
